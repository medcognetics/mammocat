version: 2.1

jobs:
    quality:
        docker:
            - image: cimg/python:3.12-node
        steps:
            - checkout
            - run:
                name: Install Rust
                command: |
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                    echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            - run:
                name: Install Rust components
                command: rustup component add rustfmt clippy
            - run:
                name: Install uv
                command: curl -LsSf https://astral.sh/uv/install.sh | sh
            - restore_cache:
                keys:
                    - quality-cache-v1-{{ checksum "Cargo.lock" }}-{{ checksum "pyproject.toml" }}-{{ checksum "node/package-lock.json" }}
                    - quality-cache-v1-
            - run:
                name: Install Python dependencies
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make dev
            - run:
                name: Install Node dependencies
                command: make node-install
            - run:
                name: Check formatting
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make format-check
            - run:
                name: Run linting
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make lint
            - run:
                name: Type checking
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make typecheck
            - run:
                name: Build Node bindings
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make node-build
            - run:
                name: Type-check Node bindings
                command: make node-typecheck
            - save_cache:
                key: quality-cache-v1-{{ checksum "Cargo.lock" }}-{{ checksum "pyproject.toml" }}-{{ checksum "node/package-lock.json" }}
                paths:
                    - "~/.cargo"
                    - "./target"
                    - "./.venv"
                    - "./node/node_modules"

    build:
        docker:
            - image: cimg/python:3.12-node
        steps:
            - checkout
            - run:
                name: Install Rust
                command: |
                    curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
                    echo 'export PATH="$HOME/.cargo/bin:$PATH"' >> $BASH_ENV
            - run:
                name: Install uv
                command: curl -LsSf https://astral.sh/uv/install.sh | sh
            - restore_cache:
                keys:
                    - build-cache-v1-{{ checksum "Cargo.lock" }}-{{ checksum "pyproject.toml" }}-{{ checksum "node/package-lock.json" }}
                    - build-cache-v1-
            - run:
                name: Install Python dependencies
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make dev
            - run:
                name: Install Node dependencies
                command: make node-install
            - run:
                name: Build Rust binaries
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    cargo build --release --all-features
            - run:
                name: Build Python bindings
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make build
            - run:
                name: Build Node bindings
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make node-build
            - run:
                name: Run tests
                command: |
                    export PATH="$HOME/.cargo/bin:$PATH"
                    make test
            - run:
                name: Run Node tests
                command: make node-test
            - run:
                name: Verify Node package
                command: make node-pack
            - save_cache:
                key: build-cache-v1-{{ checksum "Cargo.lock" }}-{{ checksum "pyproject.toml" }}-{{ checksum "node/package-lock.json" }}
                paths:
                    - "~/.cargo"
                    - "./target"
                    - "./.venv"
                    - "./node/node_modules"
            - persist_to_workspace:
                root: .
                paths:
                    - target/

workflows:
    build_and_test:
        jobs:
            - quality
            - build
