name: Production Build

on:
  schedule:
    - cron: "17 4 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-build-${{ github.ref }}
  cancel-in-progress: false

jobs:
  production-build:
    name: production-build
    runs-on: [self-hosted, linux, x64, beryl]
    timeout-minutes: 45
    env:
      CARGO_TERM_COLOR: always
      PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
      UV_NO_SYNC: "1"
      UV_PYTHON: "3.14"
      UV_PYTHON_DOWNLOADS: never
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.14
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Set up Rustup
        run: python scripts/ci/bootstrap_rustup.py

      - name: Install Rust 1.97.1
        run: rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.29
          enable-cache: false

      - name: Set up Node 22.23.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.0

      - name: Install locked Python dependencies
        run: uv sync --frozen --no-install-project --extra dev --python 3.14

      - name: Verify production outputs
        run: make verify-production
