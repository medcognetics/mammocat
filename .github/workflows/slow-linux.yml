name: Slow Linux

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: slow-linux-${{ github.ref }}
  cancel-in-progress: false

jobs:
  slow-linux:
    name: slow-linux
    runs-on: [self-hosted, linux, x64, beryl]
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      UV_NO_SYNC: "1"
      UV_PYTHON: "3.14"
      UV_PYTHON_DOWNLOADS: never
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Python 3.10
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"

      - name: Set up Rustup
        run: python scripts/ci/bootstrap_rustup.py

      - name: Install Rust toolchains
        run: |
          rustup toolchain install 1.97.1 --profile minimal --component clippy,rustfmt
          rustup toolchain install 1.88.0 --profile minimal

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: 0.11.29
          enable-cache: false

      - name: Check the Rust 1.88 MSRV
        env:
          PYO3_PYTHON: python
        run: cargo +1.88.0 check --locked --workspace --all-targets --all-features

      - name: Set up Python 3.14
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.14"

      - name: Install locked Python dependencies
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: uv sync --frozen --no-install-project --extra dev --python 3.14

      - name: Build Python 3.14 bindings
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: make build

      - name: Run Python coverage
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: "1"
        run: make test-cov

      - name: Set up Node 22.23.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22.23.0

      - name: Test commit-pinned Node installation
        run: make node-test-git-install

      - name: Upload Python coverage
        if: ${{ always() && hashFiles('htmlcov/**') != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: python-coverage-html
          path: htmlcov/
          if-no-files-found: error
          retention-days: 7
